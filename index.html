<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#00553E">
<title>Raffles Paediatric Formulary</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--p:#00553E;--pl:#007A57;--pd:#003D2D;--bg:#F3F5F4;--c:#FFF;--t:#1A2B25;--t2:#5F7068;--bd:#DDE3DF;--g:#27AE60;--r:#C0392B;--o:#E67E22;--rd:14px;--s:0 2px 10px rgba(0,60,40,.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--t);min-height:100dvh;overflow-x:hidden}

/* HEADER */
.hd{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;padding:12px 16px;position:sticky;top:0;z-index:100;box-shadow:0 3px 14px rgba(0,60,40,.18)}
.hd-r{max-width:540px;margin:0 auto;display:flex;align-items:center;gap:10px}
.hd .bk{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.15);border:none;color:#fff;font-size:17px;cursor:pointer;display:none;align-items:center;justify-content:center;flex-shrink:0}
.hd .bk.on{display:flex}
.hd-t{flex:1;min-width:0}
.hd-br{font-size:9px;font-weight:600;letter-spacing:1.6px;text-transform:uppercase;opacity:.6}
.hd-ti{font-size:16px;font-weight:700;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* PATIENT BAR */
.pb{background:var(--c);border-bottom:1px solid var(--bd);padding:8px 16px;position:sticky;top:48px;z-index:90;box-shadow:0 2px 6px rgba(0,0,0,.03)}
.pb-i{max-width:540px;margin:0 auto;display:flex;align-items:flex-end;gap:6px}
.pf{display:flex;flex-direction:column;gap:1px}
.pf label{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--t2)}
.pf input{width:68px;height:34px;border:1.5px solid var(--bd);border-radius:10px;padding:0 6px;font-size:15px;font-weight:600;background:var(--bg);outline:none;text-align:center;transition:.2s}
.pf input:focus{border-color:var(--p);background:#fff}
.pf input.ok{border-color:var(--g);background:#E8F5E9;color:var(--pd)}
.por{font-size:10px;color:var(--t2);font-weight:600;padding-bottom:7px}
.pest{padding-bottom:5px;font-size:12px;font-weight:600;color:var(--p);min-width:44px}
.psel{margin-left:auto;padding-bottom:2px}
.psel .badge{background:var(--p);color:#fff;font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;cursor:pointer;display:none;align-items:center;gap:5px}
.psel .badge.on{display:flex}

/* MAIN */
.mn{max-width:540px;margin:0 auto;padding:10px 16px 84px}

/* SEARCH */
.sb{background:var(--c);border-radius:var(--rd);box-shadow:var(--s);display:flex;align-items:center;padding:0 12px;height:42px;margin-bottom:12px;border:1.5px solid transparent;transition:.2s}
.sb:focus-within{border-color:var(--p)}
.sb svg{color:var(--t2);flex-shrink:0;width:15px;height:15px}
.sb input{flex:1;border:none;outline:none;font-size:14px;padding:0 8px;background:transparent}
.sb input::placeholder{color:#A8B5AF}
.sb .xb{width:22px;height:22px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;display:none;align-items:center;justify-content:center;color:var(--t2);font-size:11px;font-weight:700}
.sb .xb.on{display:flex}

/* SYSTEM GRID */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.sc{background:var(--c);border-radius:var(--rd);padding:14px;box-shadow:var(--s);cursor:pointer;transition:transform .12s;border-left:4px solid transparent;position:relative}
.sc:active{transform:scale(.97)}
.sc .si{font-size:22px;margin-bottom:4px}
.sc .sn{font-size:13px;font-weight:700;line-height:1.2}
.sc .ct{font-size:11px;color:var(--t2);margin-top:1px}
.c0{border-left-color:#E67E22}.c1{border-left-color:#1E8449}.c2{border-left-color:#2E86C1}.c3{border-left-color:#8E44AD}
.c4{border-left-color:#D4AC0D}.c5{border-left-color:#148F77}.c6{border-left-color:#C0392B}.c7{border-left-color:#2D6A4F}
.n0{background:#E67E22}.n1{background:#1E8449}.n2{background:#2E86C1}.n3{background:#8E44AD}
.n4{background:#D4AC0D}.n5{background:#148F77}.n6{background:#C0392B}.n7{background:#2D6A4F}

/* DRUG CARDS */
.vw{display:none}.vw.on{display:block}
.sl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t2);margin:2px 0 8px 2px}
.dc{background:var(--c);border-radius:var(--rd);margin-bottom:8px;box-shadow:var(--s);overflow:hidden}
.dt{padding:10px 12px;display:flex;align-items:flex-start;gap:8px}
.dt .nm{width:24px;height:24px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;margin-top:1px}
.dt .di{flex:1;min-width:0;cursor:pointer}
.dt .dn{font-size:13px;font-weight:600;line-height:1.25}
.dt .dp{font-size:12px;color:var(--p);font-weight:700;margin-top:2px;min-height:15px}
.dt .dp.warn{color:var(--o)}
.dt .da{display:flex;gap:4px;flex-shrink:0;align-items:flex-start;margin-top:-2px}
.ab{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--g);background:#F0FFF4;color:var(--g);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s}
.ab:hover,.ab.on{background:var(--g);color:#fff;border-color:var(--g)}
.eb{width:30px;height:30px;border-radius:9px;border:1.5px solid var(--bd);background:var(--bg);color:var(--t2);cursor:pointer;display:flex;align-items:center;justify-content:center}
.eb svg{transition:transform .2s;width:13px;height:13px}
.dc.op .eb svg{transform:rotate(180deg)}
.db{max-height:0;overflow:hidden;transition:max-height .3s ease}
.dc.op .db{max-height:3000px}
.din{padding:0 12px 12px}
.ds{margin-bottom:7px}
.dl{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--p);margin-bottom:2px}
.dv{font-size:12px;line-height:1.5;white-space:pre-line;word-break:break-word}
.dw{background:#FFF5F5;border-left:3px solid var(--r);padding:7px 10px;border-radius:0 8px 8px 0;font-size:11.5px;line-height:1.4;color:#6B2020;white-space:pre-line;word-break:break-word}
.dhr{height:1px;background:var(--bd);margin:7px 0}

/* CONTRAINDICATION WARNINGS */
.dc.contra{border-left:4px solid var(--r);background:#FFFAFA}
.dc.contra .dt{background:linear-gradient(90deg,#FFF0F0 0%,var(--c) 60%)}
.dc.age-warn{border-left:4px solid var(--o);background:#FFFCF5}
.dc.age-warn .dt{background:linear-gradient(90deg,#FFF8EC 0%,var(--c) 60%)}
.cw-bar{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 8px;margin-top:-4px}
.cw-tag{font-size:9px;font-weight:700;padding:2px 7px;border-radius:6px;text-transform:uppercase;letter-spacing:.3px;display:inline-flex;align-items:center;gap:3px}
.cw-tag.age{background:#C0392B;color:#fff}
.cw-tag.warn{background:#FFF0F0;color:#C0392B;border:1px solid #F5C6C6}
.cw-tag.caution{background:#FFF3CD;color:#856404;border:1px solid #F5E6A3}

/* MATRIX DOSE BOX (inside expanded drug card) */
.mx-box{background:#F0F9F0;border:1.5px solid var(--g);border-radius:10px;padding:10px 12px;margin-bottom:7px}
.mx-box .mx-title{font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.6px;color:var(--g);margin-bottom:4px}
.mx-row{display:flex;justify-content:space-between;padding:3px 0;border-bottom:1px solid #D5EDD5;font-size:12px}
.mx-row:last-child{border-bottom:none}
.mx-row .age{color:var(--t2);font-weight:500;min-width:36px}
.mx-row .wt{color:var(--t2);font-size:11px;min-width:36px}
.mx-row .dose{font-weight:700;color:var(--pd);text-align:right}
.mx-row.hl{background:#DCEDC8;border-radius:4px;padding:3px 4px;font-weight:800}
.mx-row.hl .dose{color:var(--p)}

/* SELECTED PANEL */
.so{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;display:none;opacity:0;transition:opacity .25s}
.so.on{display:block;opacity:1}
.sp{position:fixed;bottom:0;left:0;right:0;max-height:85vh;background:var(--c);border-radius:18px 18px 0 0;z-index:210;transform:translateY(100%);transition:transform .3s ease;overflow:hidden;display:flex;flex-direction:column}
.sp.on{transform:translateY(0)}
.sp-h{padding:14px 16px;border-bottom:1px solid var(--bd);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.sp-h h3{font-size:15px;font-weight:700}
.sp-h .cl{width:28px;height:28px;border-radius:50%;background:var(--bg);border:none;cursor:pointer;font-size:14px;color:var(--t2);display:flex;align-items:center;justify-content:center}
.sp-h .clr{font-size:11px;color:var(--r);font-weight:600;cursor:pointer;background:none;border:none;padding:4px 8px}
.sp-b{overflow-y:auto;padding:10px 16px 20px;flex:1}
.sp-pt{background:linear-gradient(135deg,#E8F5E9,#F0F9F0);border-radius:10px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;gap:6px}
.sp-pt .w{font-size:18px;font-weight:800;color:var(--pd)}
.sp-pt .a{font-size:12px;color:var(--t2)}
.sd{background:var(--bg);border-radius:10px;padding:10px 12px;margin-bottom:6px;position:relative}
.sd-n{font-size:12.5px;font-weight:700;color:var(--t)}
.sd-c{font-size:9px;color:var(--t2);text-transform:uppercase;letter-spacing:.4px;margin-bottom:1px}
.sd-d{font-size:14px;font-weight:800;color:var(--p);margin-top:3px}
.sd-f{font-size:10.5px;color:var(--t2)}
.sd-x{position:absolute;top:6px;right:6px;width:20px;height:20px;border-radius:50%;background:var(--c);border:1px solid var(--bd);cursor:pointer;font-size:11px;color:var(--r);display:flex;align-items:center;justify-content:center}
.se{text-align:center;padding:28px 16px;color:var(--t2);font-size:12px}

/* ALGORITHM */
.ag{margin-bottom:12px}
.ag-t{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.7px;color:var(--t2);margin-bottom:6px;padding-left:2px}
.ax{background:var(--c);border-radius:var(--rd);margin-bottom:5px;box-shadow:var(--s);overflow:hidden}
.ax-h{padding:10px 12px;display:flex;align-items:center;gap:7px;cursor:pointer}
.ax-i{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0}
.ax-i.ent{background:#D6EAF8}.ax-i.ast{background:#F0E0FF}.ax-i.gi{background:#FFF3CD}
.ax-i.uti{background:#D1ECF1}.ax-i.neu{background:#F8D7DA}.ax-i.der{background:#E8F4EA}
.ax-n{font-size:12px;font-weight:600;flex:1;line-height:1.2}
.ax-b{max-height:0;overflow:hidden;transition:max-height .3s}
.ax.op .ax-b{max-height:2000px}
.ax-c{padding:4px 12px 10px;font-size:12px;line-height:1.55;white-space:pre-line}

/* FULL MATRIX TAB */
.fm{background:var(--c);border-radius:var(--rd);margin-bottom:8px;box-shadow:var(--s);overflow:hidden}
.fm-h{padding:10px 12px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;font-size:13px;font-weight:700;color:var(--p)}
.fm-h svg{color:var(--t2);transition:transform .2s;width:14px;height:14px}
.fm.op .fm-h svg{transform:rotate(180deg)}
.fm-b{max-height:0;overflow:hidden;transition:max-height .3s}
.fm.op .fm-b{max-height:1500px}
.fm-s{overflow-x:auto;-webkit-overflow-scrolling:touch;padding:0 0 8px}
table.mt{font-size:10.5px;border-collapse:collapse;min-width:100%}
.mt th{background:var(--p);color:#fff;padding:6px 7px;text-align:left;white-space:nowrap;font-weight:600;position:sticky;top:0}
.mt td{padding:4px 7px;border-bottom:1px solid var(--bd);white-space:nowrap}
.mt tr:nth-child(even) td{background:#F8FAF9}
.mt tr.hl td{background:#E8F5E9;font-weight:700}

/* BOTTOM NAV */
.bn{position:fixed;bottom:0;left:0;right:0;background:var(--c);border-top:1px solid var(--bd);display:flex;justify-content:center;padding:3px 0;padding-bottom:max(3px,env(safe-area-inset-bottom));z-index:100;box-shadow:0 -2px 8px rgba(0,0,0,.03)}
.bn-i{display:flex;max-width:540px;width:100%;justify-content:space-around}
.nb{display:flex;flex-direction:column;align-items:center;gap:1px;padding:5px 14px;border:none;background:none;cursor:pointer;color:var(--t2);font-size:9px;font-weight:600;letter-spacing:.2px;transition:.15s}
.nb.on{color:var(--p)}
.nb svg{width:20px;height:20px}

@keyframes fi{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.sc,.dc,.ax,.fm{animation:fi .18s ease forwards}
</style>
</head>
<body>

<div class="hd"><div class="hd-r">
  <button class="bk" id="bk" onclick="goBack()">‹</button>
  <div class="hd-t"><div class="hd-br">Raffles Medical</div><div class="hd-ti" id="hT">Paediatric Formulary</div></div>
</div></div>

<div class="pb"><div class="pb-i">
  <div class="pf"><label>Weight (kg)</label><input type="number" id="pW" placeholder="kg" min="1" max="80" step="0.1" inputmode="decimal"></div>
  <div class="por">or</div>
  <div class="pf"><label>Age</label><input type="text" id="pA" placeholder="e.g. 3y" inputmode="text"></div>
  <div class="pest" id="pE"></div>
  <div class="psel"><div class="badge" id="sBdg" onclick="openSel()"><span>🧾</span><span id="sN">0</span> selected</div></div>
</div></div>

<div class="mn">
  <div class="vw on" id="vH">
    <div class="sb"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input type="text" id="sI" placeholder="Search any drug..."><button class="xb" id="sX" onclick="clrS()">✕</button></div>
    <div id="sG" class="sg"></div>
    <div id="sR" style="display:none"></div>
  </div>
  <div class="vw" id="vD"><div id="dL"></div></div>
  <div class="vw" id="vA"><div id="aL"></div></div>
  <div class="vw" id="vM"><div id="mL"></div></div>
</div>

<div class="so" id="sO" onclick="closeSel()"></div>
<div class="sp" id="sP">
  <div class="sp-h"><h3>Selected Drugs <span id="sT"></span></h3><div style="display:flex;gap:6px;align-items:center"><button class="clr" onclick="clrAll()">Clear all</button><button class="cl" onclick="closeSel()">✕</button></div></div>
  <div class="sp-b" id="sB"></div>
</div>

<div class="bn"><div class="bn-i">
  <button class="nb on" id="nH" onclick="nav('home')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>Formulary</button>
  <button class="nb" id="nM" onclick="nav('matrix')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>Dose Matrix</button>
  <button class="nb" id="nA" onclick="nav('algo')"><svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 5H7a2 2 0 0 0-2 2v12a2 2 0 0 0 2 2h10a2 2 0 0 0 2-2V7a2 2 0 0 0-2-2h-2"/><rect x="9" y="3" width="6" height="4" rx="2"/><path d="m9 14 2 2 4-4"/></svg>Algorithms</button>
</div></div>

<script>
const DRUGS=[{"category": "Anti-Pyretics & Analgesics", "drug_name": "Paracetamol (250mg/5ml)", "dosage_weight": "10 to 15 mg/kg/dose every 4 to 6 hours.\nMaximum daily dose: 75 mg/kg/day.\n\nAll dosing is ideally based on weight, if weight is not available, then use age.", "dosage_age": "*reference – UpToDate\nWeight based on 50th percentile of age from growth charts", "contraindications": "Refer children with fever < 3 months of age to paediatrician.\n\nDo not exceed more than 5 doses/day.\nUse with caution in hepatic and renal impairment."}, {"category": "Anti-Pyretics & Analgesics", "drug_name": "Ibuprofen (100mg/5ml)", "dosage_weight": "5 to 10 mg/kg/dose every 6 to 8 hours. \nMaximum single dose: 400 mg.\nMaximum daily dose: 40 mg/kg/day up to 1,200 mg.\n\nAll dosing is ideally based on weight, if weight is not available, then use age.", "dosage_age": "*reference – UpToDate\nWeight based on 50th percentile of age from growth charts", "contraindications": "Not suitable for children < 6 months of age. \n\nAvoid in patients with hypersensitivity to NSAIDS or aspirin.\nNot to be given to patients with active or history of peptic ulceration, GI bleeding.\nUse with caution in asthma, bronchospasm, rhinitis, urticaria, bleeding disorder, dengue fever, liver and renal impairment/ failure, collagen disease."}, {"category": "Anti-Pyretics & Analgesics", "drug_name": "Paracetamol Suppository 125mg", "dosage_weight": "40-60mg/kg /day \nIn divided doses 4-6hourly", "dosage_age": "", "contraindications": "Refer children with fever < 3 months of age to paediatrician.\n\nDo not exceed more than 5 doses.\nUse with caution in hepatic and renal impairment."}, {"category": "Anti-Pyretics & Analgesics", "drug_name": "Diclofenac suppository (12.5mg)", "dosage_weight": "0.5-2mg/kg /day\nin 2-3 divided doses\n(max 50mg/dose)", "dosage_age": "*reference – Baby Bear Book 2nd Edition 2010\nWeight based on 50th percentile of age from growth charts", "contraindications": "Avoid in patients with hypersensitivity to diclofenac sodium.\nUse with caution in:\nAsthma and urticaria\nHepatic & renal impairment\nPatients with history of blood dyscrasias\nPatients with history of acute/suspected peptic ulcer, and GI  bleed\nPatients with history of inflammatory lesions of the rectum or anus\nPatient with cardiac decompensation\nFluid retention and edema has been reported.\nAnalgesic effects may mask normal signs of infection."}, {"category": "Antibiotics", "drug_name": "Amoxycillin 125mg/5ml", "dosage_weight": "< 3m: \n20-30mg/kg BW/day \nin divided doses q12hr\n\n> 3m: \n30-50mg/kg BW/day \nin divided doses\nq8hr", "dosage_age": "*Computed based on 30mg/kg BW/day", "contraindications": "Mixture is stable for 7 -14 days.\nHypersensitivity to penicillin/cephalosporin\nHypersensitivity reaction (rash) in infectious mononucleosis. \nUse with caution in renal impairment and lymphatic leukaemia \n\nOtitis media due to resistant pneumococci: 80–90mg/kg/day q8hr"}, {"category": "Antibiotics", "drug_name": "Augmentin \n(Amox / Clavulanic Acid) 228/5ml", "dosage_weight": "<3m:\n30mg/kg/day \nin divided doses q12hr\n\n> 3 m:\n30-50mg/kg/day\nin divided doses q12hr\n\nrenal dosing\nrCl 10-30: give q12h; CrCl <10: give q24h; HD: give supplement; PD: no supplement; Info: do not use 875 mg/125 mg tab if CrCl <30", "dosage_age": "*Computed based on 30mg/kg BW/day as per Amox 200mg/5ml\n\nEpocrates online", "contraindications": "Hypersensitivity to Penicillins/Cephalosporins.\nUse with caution in:\nPenicillin associated jaundice/hepatic dysfunction.\nCholestatic jaundice\nSuspected infectious mononucleosis, renal/hepatic impairment, \nSuspected phenylketonuria since augmentin suspension contains aspartame.\nInfants with immature renal function or children with GFR<30ML. \n\nProlonged use may result in overgrowth of non-susceptible organisms.\nMixture stable for 7 days under refrigeration.\nUse higher oral dose for intermediate susceptibility/ resistant pneumococcus"}, {"category": "Antibiotics", "drug_name": "Azithromycin (Zithromax) 200mg/5ml", "dosage_weight": "Total dose 30mg/kg – given as:\n3 days course of a single daily dose of 10mg/kg or \n5 days course of 10mg/kg (max 500mg) on D1, then 5mg/kg (max 250mg) on D2-5 over 5 days \n\n(max 1500mg per course)", "dosage_age": "* Computed based on 10mg/kg BW/day\n\nFor >45kg wt give 500mg/12.5ml or 500mg tablet if they can swallow without difficulty.", "contraindications": "Special precaution in children< 6 month.\nHypersensitivity to azithromycin or any macrolide or ketolide antibiotic.\nUse with caution in :\nPatients with history cholestatic jaundice/hepatic dysfunction associated with previous use of azithromycin.\nSevere hepatic and renal impairment (GFR<10ML/ min)\nRare hereditary problems of fructose intolerance, glucose-galactose malabsorption or sucrose-isomaltase insufficiency.\nRisk of QT-interval prolongation, torsades de pointes, and polymorphic ventricular tachycardia\nConsider diagnosis of Clostridium difficile associated diarrhea in patients who present with diarrhea following treatment.\nObserve for signs of superinfection including fungi."}, {"category": "Antibiotics", "drug_name": "Cefuroxime Axetil (Zinnat) 125mg/5ml", "dosage_weight": "20-30mg/kg /day \nin divided doses\nq12hr\nMax 250mg BD", "dosage_age": "*Computed based on 30mg/kg BW/day", "contraindications": "Use with caution in children less than 3 months\nHypersensitivity to cephalosporins. \nUse with caution in anaphylactic reaction to Penicillins & Beta-lactams.\nProlonged use: monitor for pseudomembranous colitis.\nHigher dose recommended for treatment of otitis media."}, {"category": "Antibiotics", "drug_name": "Cephalexin (Kelfex)\n(125mg/5ml)", "dosage_weight": "25-50mg/kg /day\nin divided doses\nq6-8 hourly\n(max 4g/day)\n\n* for moderate infections", "dosage_age": "* Computed based on 25mg/kg BW/day", "contraindications": "10% patient allergic to Penicillins also allergic to Cephalexin.\nUse with caution in renal, liver impairment and GI disease.\nPrecaution with Cephalexin related colitis.\n\n\n\nOtitis Media: 75-100mg/kg/day q6hr\n\nChildren ≥12y.o may take cephalexin capsule 250mg TID if they can swallow capsules without difficulty."}, {"category": "Antibiotics", "drug_name": "Ciprofloxacin Oral Suspension 250mg/5ml\n\nAlso available as tablet:  250mg, 500mg", "dosage_weight": "10-30mg/kg/day in divided doses\nq12hr\n(Max: 1.5g/day)", "dosage_age": "*Computed based on 15mg/kg/day", "contraindications": "Owing to the risk of adverse side effect – musculoskeletal (e.g. tendon rupture) and neurological symptoms, use of ciprofloxacin is restricted:\nInfections caused by multidrug-resistant pathogens for which there is no safe or effective alternative or as second line where first line therapy has failed \nInfections where no other effective oral agent is available and parenteral therapy is not feasible\nAvoid iron, calcium, antacids, milk products within 2 hours of dosing.\nTake with or after food to minimise abdominal discomfort.\n\nRef: Fluoroquinolones in children.  Second Meeting of the Subcommittee of the Expert Committee on the Selection and Use of Essential Medicines. Geneva, 29 September to 3 October 2008"}, {"category": "Antibiotics", "drug_name": "Clarithromycin (Klacid)  125mg/5ml", "dosage_weight": "15mg/kg/day \nin divided doses\nq12hr", "dosage_age": "", "contraindications": "Drug of choice for pertussis & Mycoplasma.\nAvoid in known Macrolide allergy.\nNot to be administered in combination with drugs that contain astremizole, cisapride, pimozole or terfenadine.\nUse with caution in renal failure, hepatic disease, persistent diarrhea and hypokalaemia.\nRisk of QT-interval prolongation, Torsades de pointes, and polymorphic ventricular tachycardia\nLong term use may result in overgrowth of unsusceptible bacteria and fungi, and pseudomembranous colitis\n\nChildren 12y may take tablet form of Klacid 250mg BD if they can swallow without difficulty."}, { ie down immediately after taking as it may worsen coughing.\nIf taking too close with full stomach, child may vomit due to increase coughing.\n\n\n\n\n\n\n\n\n\n\n\nShould be avoided in patients less than 2 years old & used with caution in children older than 2 year."}, {"category": "URTI", "drug_name": "Leftose (Lysozyme) 5mg/ml\n\n\n\n\n\n\n\nLeftose 30mg tablet", "dosage_weight": "2 - 6y: 2-3ml tid\n\n7 - 14y: 3-4ml tid", "dosage_age": "Tablets can be dissolved in water or  chewed.", "contraindications": "Adverse reaction: shock, hypersensitivity reaction, GI disturbance.\nContraindication: persons allergic to eggs (white)\n\nMax Dose of Leftose Syrup\n(accordingly to product leaflet)\n\n\n\n\n\n\nShould be avoided in patients less than 2 years old & used with caution in children older than 2 year."}, {"category": "URTI", "drug_name": "Mucosolvan (Ambroxol HCl) 30mg/5ml", "dosage_weight": "", "dosage_age": "", "contraindications": "Adverse reaction: headache, nausea, GI disturbance.\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nShould be avoided in patients less than 2 years old & used with caution in children older than 2 year."}, {"category": "URTI", "drug_name": "PHENEXPECT\n\nAmmonium Cl 13.5mg, Diphenhydramine HCl 12.5 mg per 5ml", "dosage_weight": "2 - 6y: 2.5ml tid\n\n6 - 12y: 5ml tid\n\n> 12:y 5-10ml tid", "dosage_age": "", "contraindications": "Not for children less than 2 years old.\nContraindication: narrow-angle glaucoma.\nSpecial precaution: liver disease, patients with decreased respiratory reserves\nAdverse reaction: drowsiness, confusion, GI disturbance.\n\n\n\n\n\n\n\n\n\n\n\nShould be avoided in patients less than 2 years old & used with caution in children older than 2 year."}, {"category": "URTI", "drug_name": "Polarax (Dexchlorpheniramine maleate) 2mg/5ml", "dosage_weight": "6 – 11yr: \n2.5ml tid/qid\n\n> 12y: \n5ml tid/qid\n\nOR\n\n0.05mg/kg/dose q6-8hr", "dosage_age": "", "contraindications": "Not for children less than 6 years old.\nContraindication: ": "URTI", "drug_name": "Prospan Syrup", "dosage_weight": "", "dosage_age": "", "contraindications": "Avoid use in infants / children < 1yo\nProduct recommendation: small dose of 2.5ml bid, up to 1 week, may be used with caution if necessary.\n\n1-5yo: Do not exceed 14 days.\n\n6-11 yo: Do no exceed 4 weeks."}, {"category": "Asthma", "drug_name": "Beclo-Asma (Beclomethasone dipropionate) \nMDI\n50 mcg/puff\n250 mcg/puff", "dosage_weight": "50 mcg/puff: 1–2 puffs bid to qid\n250 mcg/puff: 1 puffs od to bid\n\n\n\n\n\n\n\nEstimated Equipotent Daily Doses Of ICS For Children\n\n> 5 years old - dry powder inhaler", "dosage_age": "", "contraindications": "Doses of inhaled steroid, such as budesonide (BUD) up to 400μg/day have not been associated with stunting of growth. \nInhaled steroids should be given via a spacer device in young children to improve delivery and reduce the incidence of oral candidiasis and hoarseness of voice. \nOlder children may use dry-powder inhalers such as the turbuhaler or accuhaler.\nIncreasing the dose of inhaled steroid beyond beclomethasone (BDP) 400μg, or its equivalent, should be done with care. The dose response curve is sigmoidal and these higher doses are associated with more systemic side-effects with little evidence of additional clinical efficacy.\nAdverse reaction: Hoarseness, throat irritation, mouth & throat candidiasis.\nRinse mouth with water after use to minimise risk of oropharyngeal thrush."}, {"category": "Asthma", "drug_name": "Pulmicort (Budesonide) \nMDI 200 mcg/puff\nTurbuhaler 200 mcg/puff", "dosage_weight": "MDI\n2 - 7y: 200-400 mcg/day in divided doses\n> 7y: 200-800 mcg/day in divided doses\n\n\nTurbuhaler\n5 - 7y: 200-400 mcg/day in divided doses\n> 7y: 200-800 mcg/day in divided doses\n\n\nEstimated Equipotent Daily Doses Of ICS For Children\n\n> 5 years old - dry powder inhaler", "dosage_age": "", "contraindications": "Doses of inhaled steroid, such as budesonide (BUD) up to 400μg/day have not been associated with stunting of growth. \nInhaled steroids should be given via a spacer device in young children to improve delivery and reduce the incidence of oral candidiasis and hoarseness of voice. \nOlder children may use dry-powder inhalers such as the turbuhaler or accuhaler.\nIncreasing the dose of inhaled steroid beyond beclomethasone (BDP) 400μg, or its equivalent, should be done with care. The dose response curve is sigmoidal and these higher doses are associated with more systemic side-effects with little evidence of additional clinical efficacy.\nAdverse reaction: Hoarseness, throat irritation, mouth & throat candidiasis.\nRinse mouth with water after use to minimise risk of oropharyngeal thrush."}, {"category": "Asthma", "drug_name": "Giona Easyhaler (Budesonide) \nInhalation powder \n200 mcg/puff", "dosage_weight": ">7y: 200-800 mcg/day\nin divided doses\n\n\n\n\n\n\n\n\n\nEstimated Equipotent Daily Doses Of ICS For Children\n\n> 5 years old - dry powder inhaler", "dosage_age": "", "contraindications": "Doses of inhaled steroid, such as budesonide (BUD) up to 400μg/day have not been associated with stunting of growth. \nInhaled steroids should be given via a spacer device in young children to improve delivery and reduce the incidence of oral candidiasis and hoarseness of voice. \nOlder children may use dry-powder inhalers such as the turbuhaler or accuhaler.\nIncreasing the dose of inhaled steroid beyond beclomethasone (BDP) 400μg, or its equivalent, should be done with care. The dose response curve is sigmoidal and these higher doses are associated with more systemic side-effects with little evidence of additional clinical efficacy.\nAdverse reaction: Hoarseness, throat irritation, mouth & throat candidiasis.\nRinse mouth with water after use to minimise risk of oropharyngeal thrush."}, {"category": "Asthma", "drug_name": "Flixotide (Fluticasone) \nEvohaler \n50 mcg, 125 mcg, 250 mcg/puff \n\nAccuhaler (dry powder) \n100 mcg/puff", "dosage_weight": "1 - 4 y: 50-100mcg bid \n(not more than 200mcg daily)\n\n> 4 y: 50–100mcg bid\n\n\n\n\n\n\n\nEstimated Equipotent Daily Doses Of ICS For Children\n\n> 5 years old - dry powder inhaler", "dosage_age": "", "contraindications": "Doses of inhaled steroid, such as budesonide (BUD) up to 400μg/day have not been associated with stunting of growth. \nInhaled steroids should be given via a spacer device in young children to improve delivery and reduce the incidence of oral candidiasis and hoarseness of voice. \nOlder children may use dry-powder inhalers such as the turbuhaler or accuhaler.\nIncreasing the dose of inhaled steroid beyond beclomethasone (BDP) 400μg, or its equivalent, should be done with care. The dose response curve is sigmoidal and these higher doses are associated with more systemic side-effects with little evidence of additional clinical efficacy.\nAdverse reaction: Hoarseness, throat irritation, mouth & throat candidiasis.\nRinse mouth with water after use to minimise risk of oropharyngeal thrush."}, {"category": "Asthma", "drug_name": "Seretide (Salmeterol/Fluticasone)\nEvohaler \n25/50, 25/125, 25/250\n\nAccuhaler (dry powder) \n50/100, 50/250, 50/500", "dosage_weight": "4 - 11y:\n25/50 - 2 puffs bid\n50/100 - 1 puff bid\n\n\n>12y:\n25/50, 25/125, 25/250 - 2 puffs bid\n50/100, 50/250, 50/500 - 1 puff bid", "dosage_age": "", "contraindications": "Adverse reaction: Hoarseness, throat irritation, mouth & throat candidiasis, tremors, palpitation.\nRinse mouth with water after use to minimise risk of oropharyngeal thrush."}, {"category": "Asthma", "drug_name": "Symbicort Turbuhaler\n(Budesonide/Formoterol)\n80/4.5 mcg\n160/4.5 mcg", "dosage_weight": "> 6y: 1-2 puffs 80/4.5 mcg bid\n\n> 18y: 1-2 puffs 80/4.5 or 160/4.5 mcg bid (max 4 puffs bid)\n\nFor SMART therapy:\nadditional inhalation may be taken as needed BUT not > 6 puffs per occasion.\nTotal daily dose of up to 12 inhalations could be used for limited period.", "dosage_age": "", "contraindications": "Contraindicated in r necrosis, myopathy, cataract, glaucoma."}, {"category": "Asthma", "drug_name": "Hydrocortisone Inj. 100mg/vial", "dosage_weight": "4–5mg/kg/dose IV q4-6 hourly", "dosage_age": "", "contraindications": ""}, {"category": "Asthma", "drug_name": "Salbutamol Syrup \n2mg/5ml", "dosage_weight": "2-6y: 0.1–0.3mg/kg/dose tid or qid\n\n6-12y: 2mg/dose tid or qid", "dosage_age": "", "contraindications": "Adverse reaction: tremors, tachycardia, palpitation."}, {"category": "Asthma", "drug_name": "Theophylline Syrup 80mg/15ml", "dosage_weight": "15–20mg/kg/day in divided doses tid or qid", "dosage_age": "", "contraindications": "Adverse reaction: tremors, tachycardia, palpitation."}, {"category": "Asthma", "drug_name": "Ketotifen Syrup (Zaditen)\n\n1mg/5ml\n1mg  tablet", "dosage_weight": "6m – 3y: 2.5ml bid\n\n> 3y: 5ml bid", "dosage_age": "", "contraindications": "May cause drowsiness at the beginning of treatment, but this will disappear after continued use."}, {"category": "Asthma", "drug_name": "Singulair (Montelukast)\n\n4mg chewable tablet\n4mg granules for oral soln\n5mg chewable tablet\n10mg FC tablet", "dosage_weight": "6m - 5y: \n4mg oral granules od or 4mg tablet od\n\n6 - 14y: \n5mg chewable tablet od\n\n> 15y: 10mg od", "dosage_age": "", "contraindications": "All doses to be taken in the evening.\nAdverse reaction: thirst, headache, abdominal pain, diarrhoea, hyperkinesia, rash.\nMay be mixed with milk, water, fruit juice."}, {"category": "Asthma", "drug_name": "Adrenaline 1 mg/mL (1:1000)", "dosage_weight": "Adrenaline 1 mg/mL (1:1000)", "dosage_age": "", "contraindications": "mg/kg IM or SC if no evidence of anaphylaxis\n\n(maximum 0.4 mg/dose = 0.4 mL of 1 mg/mL solution)\nMay be repeated every 10 to 20 minutes for 3 doses"}, {"category": "Asthma", "drug_name": "Iliadin (oxymethazoline)", "dosage_weight": "", "dosage_age": "", "contraindications": ""}, {"category": "Asthma", "drug_name": "Avamys \n(Fluticasone furoate) 27.5mcg/spray", "dosage_weight": "6 - 11y: ma", "drug_name": "Polydexa \nEar Solution Drops\n\nComposition:\nNeomycin sulfate\nPolymyxin B sulphate\nDexamethasone Sod. Metasulfobenzoate\nThiomersal", "dosage_weight": ">2 – 9yo: 1 drop BD\n10-12yo: 2 drops BD\n>12yo: 1-5 drops BD", "dosage_age": "", "contraindications": ">2 – 9yo: 1 drop BD\n10-12yo: 2 drops BD\n>12yo: 1-5 drops BD"}, {"category": "Asthma", "drug_name": "Soluwax\n\nComposition:\nDocusate Sodium 0.5%", "dosage_weight": ">2 – 9yo: 5 drops BD\n10-12yo: 10 drops BD", "dosage_age": "", "contraindications": ">2 – 9yo: 5 drops BD\n10-12yo: 10 drops BD"}, {"category": "Gastrointestinal", "drug_name": "COLIMIX \n(Dyclomine HCl 5mg, Simethicone 50mg per 5ml)\n\n5ml/5mg", "dosage_weight": "> 6m: 5ml before feeding\n(max: 4 doses per 24 hr)\n\n4-12y: 5-10ml qid\n\n> 12y: 10mi tid/qid", "dosage_age": "", "contraindications": "Not for children < 3 month of age.\nAntispasmodic\nContraindication: infant less than 6 months"}, {"category": "Gastrointestinal", "drug_name": "DIMENATE \n(Dimenhydrate15mg/5ml", "dosage_weight": "2 - 6y: 12.5-25mg tid\n\n7 - 12y: 25-50mg tid\n\n> 12y: 50-100mg tid", "dosage_age": "+ & # Lower dose advisable in young children due to sedation (GPP)\n*Computered base on 12.5mg\n^ Computered base on 25mg", "contraindications": "Not for children < 2 year of age.\nUse for nausea and vomiting, vertigo, motion sickness\nContraindication: Premature infants, acute asthma attack, use with MAOI and acute porphyria.\nAdverse reaction: drowsiness, dry mouth.\n\nCaution should be used when Dimenhydrinate is given in conjunction with certain antibiotics that may cause ototoxicity, since Dimenhydrinate is capable of masking ototoxic symptoms.\n\nFor infants and children, overdosage may cause hallucinations, convulsions, or death."}, {"category": "Gastrointestinal", "drug_name": "HYOSCINE BUTYLBROMIDE (5mg/5ml)", "dosage_weight": "0.5mg/kg/dose q6–8hr \n(max 40mg)\nand\n> 6y: 10mg tid", "dosage_age": "", "contraindications": "Not for children < 3 year of age.\nConraindicated in narrow-angle glaucoma, acute haemorrhage, paralytic ileus, cardiac insufficiency, myasthenia gravis\nUse with precaution in hepatic/renal disease, pyloric stenosis, megacolon, urinary retention, prostatic hyperplasia, psychosis, seizure disorders, ulcerative colitis, coronary artery disease, tachyarrhythmias, heart failure, hypertension. \nAdverse reaction: flushing, increased sensitivity to light, rash, dermatitis, postural hypotension, tachycardia, fibrillation, tremor, weakness dizziness, drowsiness, fatigue, headache, memory loss, dysphagia, nausea, vomiting , bloatedness, constipation, urinary retention, photophobia, pupil dilation, follicular conjunctivitis, increased IOP impaired accommodation, blurred vision, cycloplegia, narrow-angle glaucoma, increased intraocular pain, somnolence, oedema. Rarely, psychotic reactions.\nDrug interaction: anticholinergic effect of drugs eg, antihistamines, antipsychotics, amantadine, disopyramide and other anticholinergics (eg, tiotropium, ipratropium, atropine-like compounds) may be intensified by hyoscine-N-butylbromide."}, {"category": "Gastrointestinal", "drug_name": "LACTOEOL FORTE SACHET\nSachets: 10 Billion heat killed, freeze-dried Lactobacillus LB per sachet", "dosage_weight": "Infants: \n1 sachet 1st & 2nd dose; following day 1 sachet bid\n\nChildren: \n1-2 sachet 1st dose, 1 sachet 2nd dose, following day 1 sachet bid\n\n* Initial dose maybe given as double dose.", "dosage_age": "", "contraindications": ""}, {"category": "Gastrointestinal", "drug_name": "LACTULOSE", "dosage_weight": "< 1 y: 2.5ml bid\n2-5y: 5ml bid\n6-12y: 10ml bid\n\nAdult: 15-30 ml in divided doses", "dosage_age": "", "contraindications": ""}, {"category": "Gastrointestinal", "drug_name": "Loperamide \n1mg/5ml \n2mg tab", "dosage_weight": "2-5 yrs:\n1mg initial dose.\n\n6-11 yrs:\n2mg initial dose and to be given 1mg after each unformed stool\n\nMax dose:\n2-5 yrs : 3mg (15ml per day)\n\n6-8 yrs: 4mg (20ml per day)\n\n9-11 yrs:  6mg (30ml per day)\n\n≥12yrs: 8mg (40ml per day)", "dosage_age": "", "contraindications": "Alternative Dosing:\n0.05 – 0.1 mg/kg 8-12 hourly; increasing if required to max. 0.4mg/kg 8 hourly"}, {"category": "Gastrointestinal", "drug_name": "Repalyte 4.87g", "dosage_weight": "Child - 1 sachet after each loose bowel motion or 6-12 sachets per 24 hours. \nAdults - 1 or 2 sachets after each loose bowel motion or 8-16 sachets per 24 hours.", "dosage_age": "", "contraindications": "Reconstitute 1 satchet with 240ml water \nDiscard balance solution after 24 hours"}, {"category": "Gastrointestinal", "drug_name": "Hidrasec (Racecadotril) \n\nInfant: 10mg granules for oral suspension\n\nChildren: 30mg granules for oral suspension", "dosage_weight": "Not to be used in children under three months old. \n\nHidrasec children (30mg) granules for suspension – for children > 13kg \n13 - 27kg: 1 sachet tid\n≥27kg: 2 sachets tid\n \nHidrasec infant (10mg) granules for suspension \n< 9kg: 1 sachet tid\n9 - 13kg: 2 sachets tid", "dosage_age": "", "contraindications": "Mechanism of action: a pro-drug, which is broken down into the active ingredient thiorphan. Thiorphan is an enkephalinase inhibitor, which prevents the breakdown of enkephalins  in the lining of the small intestine, reducing  the amount of water and salts that are secreted into the intestine. This makes the stools less watery and helps to control acute diarrhoea. \nMix well and administer immediately. Can be mixed with food, dispersed in a glass of water, or added to a feeding bottle for babies. \nTreatment with Hidrasec should be continued until 2 normal stools are passed.\nTreatment with Hidrasec should be limited to seven days only. Long-term use should be avoided.\nUse with caution in renal & liver impairment, children with diabetes (both Hidrasec children and infant granules for suspension contain sucrose).\nContraindicated in:\npeople with rare hereditary problems of galactose intolerance, the Lapp lactase deficiency or glucose-galactose malabsorption \nchildren with rare hereditary problems of fructose intolerance, glucose-galactose malabsorption or sucrase-isomaltase insufficiency as Hidrasec infant and children granules for suspension both contain lactose and sucrose."}, {"category": "Gastrointestinal", "drug_name": "SMECTA SACHET\n(Dioctahedral smectite)\n3g/sachet", "dosage_weight": "< 1y: 1 sachet/day in divided doses q8-12hr\n\n1 - 2y: 1-2 sachet/day in divided doses q8-12hr\n\n> 2y: 2-3 sachet/day in divided doses q8-12hr", "dosage_age": "", "contraindications": "May interfere with absorption of other drugs administered at the same time.\nSpace at least 2 hours apart from other medications."}, {"category": "Gastrointestinal", "drug_name": "Zentel 4% (albendazole) oral suspension \n\n400mg/10ml", "dosage_weight": "", "dosage_age": "", "contraindications": "Known hypersensitivity to albendazole or its constituents\nCaution with renal impairment/abnormal liver function test (transaminases) results\nTreatment may uncover pre-existing neurocysticercosis particularly in areas with high taeniasis infection and patient may experience neurological symptoms eg seizures, increased intracranial pressure and focal signs as a result of inflammatory reaction caused by the death of the parasites within the brain.\nMay repeat in 2 weeks if not cured."}, {"category": "Gastrointestinal", "drug_name": "Nystatin Suspension 100,000U/ml", "dosage_weight": "Neonate:\nPrem: 100,000U qid\nTerm: 200,000U qid\nInfant: 200,000U qid\nChild: 400,000U tid", "dosage_age": "", "contraindications": "Side effects: GI symptoms, rash.\nFor oral thrush, swish in mouth and swallow.\nFor small children who are unable to swish, can apply directly to the lesion using a dropper."}, {"category": "Gastrointestinal", "drug_name": "Ondansetron \n8mg Tablet\n8mg/4ml injection\n4mg/2ml injection", "dosage_weight": "0.1-0.2mg/kg/dose", "dosage_age": "", "contraindications": "Note: dosing for Nausea/vomiting related to chemotherapy is higher and not covered here as it is usually administered by oncology staff."}, {"category": "Urinary Tract", "drug_name": "Augmentin \n(Amox / Clavulanic Acid) 228/5ml", "dosage_weight": "<3m:\n30mg/kg/day \nin divided doses\nq12hr\n\n> 3 m:\n30-50mg/kg/day\nin divided doses\nq12hr", "dosage_age": "*Computed based on 30mg/kg BW/day as per Amox 200mg/5ml", "contraindications": "Hypersensitivity to Penicillins/Cephalosporins.\nUse with caution in:\nPenicillin associated jaundice/hepatic dysfunction.\nCholestatic jaundice\nSuspected infectious mononucleosis, renal/hepatic impairment, \nSuspected phenylketonuria since augmentin suspension contains aspartame.\nInfants with immature renal function or children with GFR<30ML. \n\nProlonged use may result in overgrowth of non-susceptible organisms.\nMixture stable for 7 days under refrigeration."}, {"category": "Urinary Tract", "drug_name": "Amoxycillin 125mg/5ml", "dosage_weight": "30-50mg/kg/day\nin divided doses\nq8hr", "dosage_age": "* Computed based on 30mg/kg BW/day", "contraindications": "Not routinely used because of incresaed local resistance\n\nMixture is stable for 14 days.\nHypersensitivity to penicillin/cephalosporin\nHypersensitivity reaction (rash) in infectious mononucleosis. \nUse with caution in renal impairment and lymphatic leukaemia"}, {"category": "Urinary Tract", "drug_name": "Cefuroxime Axetil (Zinnat) 125mg/5ml", "dosage_weight": "20-30mg/kg/day \nin divided doses\nq12hr", "dosage_age": "* Computed based on 20mg/kg BW/day", "contraindications": "Use with caution in children less than 3 months\nHypersensitivity to cephalosporins. \nUse with caution in anaphylactic reaction to Penicillins & Beta-lactams.\nProlonged use: monitor for pseudomembranous colitis."}, {"category": "Urinary Tract", "drug_name": "Cephalexin (125mg/5ml)", "dosage_weight": "25-50mg/kg/day\nin divided doses\nq6-8 hourly (max 4g/day)", "dosage_age": "* Computed based on 25mg/kg BW/day", "contraindications": "10% patient allergic to Penicillins also allergic to Cephalexin.\nUse with caution in renal, liver impairment and GI disease.\nPrecaution with cephalexin related colitis.\n\n\n\nOtitis Media: 75-100mg/kg/day q6hr\n\nChildren ≥12y.o may take cephalexin capsule 250mg TID if they can swallow capsules without difficulty."}, {"category": "Urinary Tract", "drug_name": "Ciprofloxacin Oral Suspension 250mg/5ml\n\nAlso available as tablet:  250mg, 500mg", "dosage_weight": "10-30mg/kg/day in divided doses\nq12hr\n(Max: 1.5g/day)", "dosage_age": "*Computed based on 15mg/kg/day", "contraindications": "Owing to the risk of adverse side effect – musculoskeletal (e.g. tendon rupture) and neurological symptoms, use of ciprofloxacin is restricted:\nInfections caused by multidrug-resistant pathogens for which there is no safe or effective alternative or as second line where first line therapy has failed \nInfections where no other effective oral agent is available and parenteral therapy is not feasible\nAvoid iron, calcium, antacids, milk products within 2 hours of dosing.\nTake with or after food to minimise abdominal discomfort.\n\n\n\nRef: Fluoroquinolones in children.  Second Meeting of the Subcommittee of the Expert Committee on the Selection and Use of Essential Medicines. Geneva, 29 September to 3 October 2008"}, {"category": "Urinary Tract", "drug_name": "Co-trimoxazole (Bactrim)\nTMP/SMZ \n(40mg TMP/200mg SMZ per 5ml)", "dosage_weight": "< 2y:TMP \n6-12mg/kg/day in divided doses \nq12hr\n\n> 2y:TMP \n8-12mg/kg/day in divided doses \nq12hr\n\n(Max. single dose: 160mg TMP)", "dosage_age": "* Computed based on TMP 8mg /kg BW/day", "contraindications": "Not to be used in children <2mth of age\nAvoid in G6PD deficiency\nContraindicated in:\nPorphyria\nsevere hepatic & renal impairment\nblood dyscrasia \npatients with hypersensitivity to sulphonamides"}, {"category": "Urinary Tract", "drug_name": "Nitrofurantoin Oral Suspension                25 mg/ 5 ml\n\nAlso available as tablet: 25mg, 50mg, 100mg", "dosage_weight": ">1 mth: 5-7mg/kg/day \nin divided doses \nq6hr\n\n\nLong-term UTI prophylaxis: 1.2mg/kg/day PO single dose or q12hr (max dose 100mg/day)", "dosage_age": "*computed based on 5mg/kg/day", "contraindications": "Not considered adequate for pyelonephritis because of poor tissue penetration.\nMay be Avoid in patients with renal impairment, patients with G6PD deficiency\nTake with food to decrease GI side effects.\nMaintain adequate hydration"}, {"category": "Urinary Tract", "drug_name": "Potassium Citrate Liquid", "dosage_weight": "", "dosage_age": "For cystitis:", "contraindications": "Helps to  relieve the discomfort of cystitis.\nAlso used as a urinary alkalinising agent.\nPatients should be encouraged to drink plenty of fluids per day.\nUse with caution in hyperkalemia, renal impairment and cardiac disease.\n\nMay interact with the following medicine:\nAntibacterials such as nitrofurantoin or methenamine\nACE inhibitors\nAngiotensin-II receptor antagonists\nAliskiren\nCiclosporin\nDiuretics \nTacrolimus\nCardiac glycosides such as digoxin\nOther medicines containing potassium or medicines that increase the level of potassium in your body"}, {"category": "CNS / Neurological", "drug_name": "Diazepam \nTab 2mg, 5mg, 10mg Inj 10mg/2ml\nStesolid Rectal solution 5mg/tube", "dosage_weight": "Acute Seizure Therapy\n15kg: 10mg per rectum\n10-15kg: 5mg per rectum\n\n\nStatus Epilepticus\n≥5 yr: 1mg IV every 2-5min (max.10mg)\n1mth - <5 yr: 0.2-0.5mg IV every 2.5 min (max. 5mg).\nMay repeat 2-4 hrly, if needed", "dosage_age": "", "contraindications": "Respiratory depression, hypotension may occur with high doses and parental administration\nAvoid in patients with pre-existing CNS depression, acute and chronic pulmonary insufficiency, sleep apnoea"}, {"category": "CNS / Neurological", "drug_name": "Lorazepam\nInj 2mg/ml", "dosage_weight": "Status Epilepticus\nInfants & Children: 0.05 – 1 mg/kg (max. 4mg/dose) slow IV over 2-5 minutes.\nMay repeat in 10-15 min if no response", "dosage_age": "", "contraindications": "Respiratory depression, hypotension may occur with high doses and parental administration\nAvoid in patients with pre-existing CNS depression, acute and chronic pulmonary insufficiency, sleep apnoea"}, {"category": "CNS / Neurological", "drug_name": "Carbamazepine (Tegretol)\nTab 200mg CR Tab 200mg\nSusp 100mg/5ml", "dosage_weight": "<6 yr:\n10-20mg/kg/day in 2-3 divided doses; may increase dose every week until optimal response.\nMax recommended daily dose: 35mg/kg/day\n\n\n6-12 yr:\nInitial dose: 100mg PO 12 hourly; titrate upwards as needed\nMaintenance dose: 400-800mg/day in 3 or 4 divided doses\nMax recommended daily dose: 1000mg/day\n\nExtended Release preparations may be administered to decrease drug level fluctuation.", "dosage_age": "", "contraindications": "May decrease side effects by starting at low doses and increasing slowly\nSide effects include: dizziness, ataxia, GI symptoms, rash – photosensitivity reactions, Stevens-Johnson syndrome, SLE\nMonitor for signs of blood or skin toxicity (e.g. fever, sore throat, bruising, skin rash)\n\n\n31 Dec 2013: HSA safety Update: HLA-B*1502 genotype testing: Towards safer use of carbamazepine\nHLA-B*1502 genotyping should be ordered before initiating therapy with Carbamazepine(CBZ). The use of CBZ should be avoided and treatment alternatives are recommended in patients who are found to be positive for HLA-B*1502"}, {"category": "CNS / Neurological", "drug_name": "Valproate (Epilim)\nTab 200mg CR, 300mg, 500mg \nSyr 200mg/5ml", "dosage_weight": "Regular-Release\nInitial dose: 10-15mg/kg/day PO divided 8-24hourly\nMay increase dose by 5-10mg/kg/day at weekly intervals based on clinical response\nUsual dose range: 20-30mg/kg/day (max. 60mg/kg/day)\n\n\nExtended Release\nDose may be administered 24 hourly", "dosage_age": "", "contraindications": "May decrease side effects by starting at low doses and increasing slowly\nSide effects include: dizziness, ataxia, GI symptoms, rash – photosensitivity reactions, Stevens-Johnson syndrome, SLE\nMonitor for signs of blood or skin toxicity (e.g. fever, sore throat, bruising, skin rash)\nDosing may be increase provided able to monitor the plasma concentration.\nNot preferred in patinets < 2 year of age because risk of hepatotoxicity."}, {"category": "CNS / Neurological", "drug_name": "Phenytoin\nInj 250mg/5ml \nTab 30, 100mg \nSyr 125mg/m", "dosage_weight": "Oral therapy\nLoading dose: 15-20mg/kg PO in 3 divided doses given every 2-4hr, based on current phenytoin serum concentration.\nMaintainance dose: \n5mg/kg/day in 2-3 divided doses\nTitrate according to clinical response. (max. 300mg/day)\n\n\n\nStatus Epilepticus (IV)\nLoading dose:\nNeonates: 15-20mg/kg IV as single or divided doses\nInfant & older children: 15-20mg/kg IV as single or divided dose\nMaintenance dose: 5mg/kg/day IV divided 12hrly\nShould start 12hours after loading dose", "dosage_age": "", "contraindications": "Side effect may decrease with dose reduction or continued administration\nProlonged administration may result in subtle changes in mental function and cognition."}, {"category": "CNS / Neurological", "drug_name": "Gabapentin (Neurontin)\nTab 300mg", "dosage_weight": "30–60mg/kg/day tid in divided doses", "dosage_age": "", "contraindications": "Caution in renal impairment."}, {"category": "CNS / Neurological", "drug_name": "Levetiracetam (Keppra) Tab\nImmediate Release\n\n250mg, 500mg, 1,000mg", "dosage_weight": "As Monotherapy\n>16 yr:\nInitial Dose: 250mg PO 12 hourly.\nIncrease dose to 500mg/dose PO 12 hourly after 2 weeks\nMay further increase by 250mg PO 12 hrly based on clinical response\nMax Dose: 1500mg PO 12 hourly\n\nAs Adjunctive Therapy\n4-11 yr or <50kg\nInitial Dose: 10mg/kg/dose 12 hrly\nMay increase dose by 10mg/kg/dose 12 hourly every 2 weeks, up to 30 mg/kg/dose 12 hourly\n\n12-17yr or >50kg\nInitial dose: 500mg PO 12 hourly\nMay increase dose by 500mg every 2-4weeks, based on clincal response\nMax Dose: 3g/day PO divided 12hourly", "dosage_age": "", "contraindications": "Side effect include: somnolence, weakness, dizziness, nausea, ataxia, headache, insomnia, depression, emotional lability, tremor, vertigo, diplopia\nCaution in patient with hepatic or renal impairment, adjust dose accordingly"}, {"category": "CNS / Neurological", "drug_name": "Topiramate (Topamax) \nTab 50mg, 100mg", "dosage_weight": "Initiate at 1–2mg/kg/day nightly for 1 week, and \nincrease by 1–2mg/kg/day bid weekly \nuntil maintenance at 1–9mg/kg/day bid", "dosage_age": "", "contraindications": "Use ONLY in children above 2 years of age.\nRisk of renal stones, so ensure adequate fluid intake."}, {"category": "CNS / Neurological", "drug_name": "Vigabatrin\nTab 500mg", "dosage_weight": "Refractory Complex Partial Seizures – adjunctive treatment:\nChildren≥ 10kg and adolescent < 16y \nInitiate at 40mg/kg/day bid for 2 weeks, and increase slowly. \nMaintain at 80–100mg/kg/day om-bid.\n10-15kg: 500-1000mg/day bid\n16-30kg: 1000-1500mg/day bid\n31-50kg: 1500-3000mg/day bid\n>50kg: 2000-3000 mg/day bid", "dosage_age": "", "contraindications": "Risk of visual field constriction."}, {"category": "CNS / Neurological", "drug_name": "Atomoxetine\n10mg\n18mg\n27mg\n40mg", "dosage_weight": "", "dosage_age": "", "contraindications": "Not to be used in children less than 6 years of age\n\n2nd line drug for ADHD\t\nSE: dry mouth, nausea, constipation, tiredness, irritability, depression, palpitation, elevated blood pressure, urinary hesitancy, liver dysfunction.\nNot to be given concomitantly with MAO-I\nDose adjustment in liver failure"}, {"category": "CNS / Neurological", "drug_name": "Methyphenidate (Concerta) \nImmediate Release\n\n18mg Cap\n27mg Cap\n36mg  Cap", "dosage_weight": "Patients NEW to Concerta\n\n\nPatients currently Using Methylphenidate", "dosage_age": "", "contraindications": "Not to be used in children less than 6 years of age\n\nSE: anorexia, nausea, abdominal colic, weight loss, stunted growth, sleep difficulties, drowsiness, lethargy, headache, elevated blood pressure and pulse rate, sudden cardiac death (usually pre-existing heart condition)"}, {"category": "CNS / Neurological", "drug_name": "Methylphenidate (Ritalin) \n10mg tablet\n20mg LA tablet", "dosage_weight": "Tablets: \nStart with 5 mg twice daily (before breakfast and lunch) with gradual increments of 5 to 10 mg weekly.\n\nDaily dosage above 60 mg is not recommended.\n\n\n\n\n\n\n\n\n\n\n\n\n\nNot to be used in children less than 6 years of age\nSide effects similar to Methylphenidate (Concerta)", "dosage_age": "", "contraindications": "Ritalin should be initiated in small doses, with gradual weekly increments.\nIf improvement is not observed after appropriate dosage adjustment over a 1-month period, the drug should be discontinued.\nIf paradoxical aggravation of symptoms or other adverse effects occur, reduce dosage, or, if necessary, discontinue the drug.\nRitalin should be periodically discontinued to assess the child’s condition. Improvement may be sustained when the drug is either temporarily or permanently discontinued.\nDrug treatment should not and need not be indefinite and usually may be discontinued after puberty.\n\nRitalin-SR tablets have a duration of action of approximately 8 hours. \nRitalin-SR tablets may be used in place of Ritalin tablets when the 8-hour dosage of Ritalin-SR corresponds to the titrated 8-hour dosage of Ritalin. \nRitalin-SR tablets must be swallowed whole and never crushed or chewed."}, {"category": "Dermatological", "drug_name": "Desowen (Desonide) 0.05%\nLotion\nCream", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "In ascending order of potency: Desowen, H’cort, Bet 0.25%, Ber 0.1%, Elomet, Clobet\nPotency of ointment > cream.\nDO NOT apply potent steroids around the eyes, on the face, flexures and genitalia.\nSpecial precaution: \ndiscontinue use if irritation / sensitization develops or in the presence of uncontrolled infection.\nSystemic absorption may be increased if extreme BSA is treated or if occlusive technique is used.\nAvoid long term use esp in infants and children (not exceeding 4 weeks).\nAdverse reaction: stinging, erythema, pruritus, folliculitis and acneform reaction, skin atrophy."}, {"category": "Dermatological", "drug_name": "Hydrocortisone acetate 1% cream", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "In ascending order of potency: Desowen, H’cort, Bet 0.25%, Ber 0.1%, Elomet, Clobet.\nPotency of ointment > cream.\nDO NOT apply potent steroids around the eyes, on the face, flexures and genitalia.\nSpecial precaution: \ndiscontinue use if irritation / sensitization develops or in the presence of uncontrolled infection.\nSystemic absorption may be increased if extreme BSA is treated or if occlusive technique is used.\nAvoid long term use esp in infants and children (not exceeding 4 weeks).\nAdverse reaction: stinging, erythema, pruritus, folliculitis and acneform reaction, skin atrophy."}, {"category": "Dermatological", "drug_name": "Bethametasone valerate 0.25% cream", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "In ascending order of potency: Desowen, H’cort, Bet 0.25%, Ber 0.1%, Elomet, Clobet.\nPotency of ointment > cream.\nDO NOT apply potent steroids around the eyes, on the face, flexures and genitalia.\nSpecial precaution: \ndiscontinue use if irritation / sensitization develops or in the presence of uncontrolled infection.\nSystemic absorption may be increased if extreme BSA is treated or if occlusive technique is used.\nAvoid long term use esp in infants and children (not exceeding 4 weeks).\nAdverse reaction: stinging, erythema, pruritus, folliculitis and acneform reaction, skin atrophy."}, {"category": "Dermatological", "drug_name": "Bethametasone valerate 0.5% cream", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "In ascending order of potency: Desowen, H’cort, Bet 0.25%, Ber 0.1%, Elomet, Clobet.\nPotency of ointment > cream.\nDO NOT apply potent steroids around the eyes, on the face, flexures and genitalia.\nSpecial precaution: \ndiscontinue use if irritation / sensitization develops or in the presence of uncontrolled infection.\nSystemic absorption may be increased if extreme BSA is treated or if occlusive technique is used.\nAvoid long term use esp in infants and children (not exceeding 4 weeks).\nAdverse reaction: stinging, erythema, pruritus, folliculitis and acneform reaction, skin atrophy."}, {"category": "Dermatological", "drug_name": "Betamethsone (as 17-valerate) 0.1% cream", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "In ascending order of potency: Desowen, H’cort, Bet 0.25%, Ber 0.1%, Elomet, Clobet.\nPotency of ointment > cream.\nDO NOT apply potent steroids around the eyes, on the face, flexures and genitalia.\nSpecial precaution: \ndiscontinue use if irritation / sensitization develops or in the presence of uncontrolled infection.\nSystemic absorption may be increased if extreme BSA is treated or if occlusive technique is used.\nAvoid long term use esp in infants and children (not exceeding 4 weeks).\nAdverse reaction: stinging, erythema, pruritus, folliculitis and acneform reaction, skin atrophy."}, {"category": "Dermatological", "drug_name": "Elomet (Mometasone furoate) 0.1%\nCream\nOintment \nLotion", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "In ascending order of potency: Desowen, H’cort, Bet 0.25%, Ber 0.1%, Elomet, C norexia, vomitting, mental confusion, cramp-like pain, salivation, apprehension."}, {"category": "Dermatological", "drug_name": "Acyclovir \nSusp 200mg/5ml\nTab 200mg", "dosage_weight": "Varicella (uncomplicated): \n1m – 2y: 200mg qid \n≥ 2y: 20mg/kg/dose qid \nmax. 800mg/dose\n\nHerpes Zoster\nAs per varicella\n\nNon-genital HSV (non-immunocompromised):\n1m - ≤ 2y: 100mg 5x a day\n>2y: 20mg/kg/dose qid\n\nGenital HSV (non-immunocompromised):\n< 12y: 20mg/kg/dose qid\n≥ 12y: 200mg 5x a day or 400mg tid", "dosage_age": "", "contraindications": "Adverse reaction: headache, dizziness, rash, ↓WBC, GI side effects.. Rarely, encephalopathy."}, {"category": "Dermatological", "drug_name": "Clotrimazole 1% cream", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "Adverse reaction: stinging, erythema, oedema, vesication, desquamation, pruritus, urticaria."}, {"category": "Dermatological", "drug_name": "Combiderm cream", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "Contains Betamethasone dipropionate 0.05%, clotrimazole 1%, gentamicin sulphate 0.1%"}, {"category": "Dermatological", "drug_name": "Foban (Fusidic acid) 2%\nCream\nOint", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "Adverse reaction: hypersensitivity reaction (rash, irritation)"}, {"category": "Dermatological", "drug_name": "Fucicort", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "Contains fusidic acid 20g, betametasone valerate 1mg\nAdverse reaction: hypersensitivity reaction (rash, irritation)."}, {"category": "Dermatological", "drug_name": "Fucidin H", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "Contains fusidic acid 20g, hydrocortisone acetate 10mg.\nAdverse reaction: hypersensitivity reaction (rash, irritation)."}, {"category": "Dermatological", "drug_name": "Gentamicin sulphate 0.1% cream", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "Adverse reaction: ototoxicity, nephrotoxicity."}, {"category": "Dermatological", "drug_name": "Miconazole nitrate 2% cream", "dosage_weight": "Apply once to twice daily (or as often as needed) and massage gently onto skin.", "dosage_age": "", "contraindications": "Special precaution: children < 2 years of age."}, {"category": "Dermatological", "drug_name": "Potasium Permanganate \n(KMnO4)\nSolution \nCrytsal", "dosage_weight": "Immerse the affected area or apply as a compress for 5-10 min.", "dosage_age": "", "contraindications": "Dissolve 1 teaspoon KMnO4 crystals with 2L water or dilute KMnO4 solution to a light pink/purple solution.\nStains clothings and skin.\nAdverse reaction: hypersensitivity reaction (rash, irritation)."}];

    if(wt<=w){
      // Parse age string to months
      const m=a.match(/^(\d+)m$/);if(m)return parseInt(m[1]);
      const mm=a.match(/^NB$/);if(mm)return 0;
      const y=a.match(/^(\d+)-(\d+)m$/);if(y)return parseInt(y[1]);
      const yr=a.match(/^(\d+)y$/);if(yr)return parseInt(yr[1])*12;
      return null;
    }
  }
  return 156; // >12y
}

let vw="home",cSys=null,sel=new Map();
const $=id=>document.getElementById(id);
const esc=s=>s?s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"):"";

function getWt(){
  const w=parseFloat($("pW").value);
  if(w>0)return w;
  const a=$("pA").value.trim().toLowerCase().replace(/\s/g,"");
  if(a&&AGE_WT[a])return AGE_WT[a];
  return null;
}
function estAge(w){if(!w)return"";for(const[wt,ag] of WT_AGE)if(w<=wt)return"~"+ag;return">12y"}

function calcDose(dn,wt){
  if(!wt)return null;
  for(const c of CALCS){
    if(!c.p.test(dn))continue;
    if(c.u==="age") return{dose:Object.values(c.ages).join(" / "),fr:c.fr,dpk:"age-based",atMax:false};
    const mg=Math.min(c.dpk*wt,c.mx);
    if(c.co>0){const ml=mg/c.co;return{dose:ml.toFixed(1)+"ml ("+mg.toFixed(0)+"mg)",fr:c.fr,dpk:c.dpk+"mg/kg",atMax:mg>=c.mx}}
    return{dose:mg.toFixed(1)+"mg",fr:c.fr,dpk:c.dpk+"mg/kg",atMax:mg>=c.mx};
  }
  return null;
}

function getMatrixDose(dn,wt){
  const mk=getMatrixKey(dn);
  if(!mk||!MATRIX[mk])return null;
  const entries=MATRIX[mk].entries;
  if(!entries||!entries.length)return null;
  if(!wt)return{key:mk,entries:entries,matchIdx:-1};
  // Find closest weight match
  let best=-1,bestDiff=999;
  entries.forEach((e,i)=>{
    const ew=parseFloat(e.wt);
    if(!isNaN(ew)&&e.dose){
      const diff=Math.abs(ew-wt);
      if(diff<bestDiff){bestDiff=diff;best=i}
    }
  });
  return{key:mk,entries:entries,matchIdx:best,matchDose:best>=0?entries[best].dose:null,matchAge:best>=0?entries[best].age:null};
}

function onPt(){
  const w=getWt();
  const wI=$("pW"),aI=$("pA");
  wI.classList.toggle("ok",!!parseFloat(wI.value));
  const a=aI.value.trim().toLowerCase().replace(/\s/g,"");
  if(a&&AGE_WT[a]&&!parseFloat(wI.value)) $("pE").textContent="≈"+AGE_WT[a]+"kg";
  else if(w) $("pE").textContent=estAge(w);
  else $("pE").textContent="";
  if(vw==="drugs"&&cSys!==null)renderDrugs(cSys);
  if(vw==="matrix")renderMx();
  updBdg();
}

function init(){
  renderHome();renderAx();renderMx();
  $("pW").addEventListener("input",onPt);
  $("pA").addEventListener("input",onPt);
  $("sI").addEventListener("input",onSrch);
}

function renderHome(){
  let h="";
  SYS.forEach((s,i)=>{
    const cnt=DRUGS.filter(d=>d.category===s.k).length;
    h+=`<div class="sc c${s.c}" onclick="openSys(${i})"><div class="si">${s.i}</div><div class="sn">${s.k}</div><div class="ct">${cnt} drug${cnt!==1?"s":""}</div></div>`;
  });
  $("sG").innerHTML=h;
}

function openSys(i){
  cSys=i;$("hT").textContent=SYS[i].k;$("bk").classList.add("on");
  show("drugs");renderDrugs(i);
}

function renderDrugs(si){
  const sys=SYS[si],drugs=DRUGS.filter(d=>d.category===sys.k),wt=getWt();
  let h=`<div class="sl">${drugs.length} drugs${wt?" · patient "+wt+" kg":""}</div>`;
  drugs.forEach((d,i)=>{h+=mkCard(d,DRUGS.indexOf(d),i+1,sys.c,wt)});
  $("dL").innerHTML=h;
}

function mkCard(d,gi,num,ci,wt){
  const calc=calcDose(d.drug_name,wt);
  const mx=getMatrixDose(d.drug_name,wt);
  const added=sel.has(gi);
  const ageM=estAgeMonths(wt);
  const contra=getContra(gi,ageM);
  // Preview: prefer matrix match dose, then calc dose
  let preview="";
  if(wt){
    if(contra&&contra.ageBlock) preview="";
    else if(mx&&mx.matchDose) preview=mx.matchDose+" ("+mx.matchAge+")";
    else if(calc) preview=calc.dose+" "+calc.fr+(calc.atMax?" ⚠️":"");
  }

  // Card classes based on contraindication status
  let cardCls="dc";
  if(contra&&contra.ageBlock) cardCls+=" contra";
  else if(contra&&contra.tags.some(t=>t.type==="warn")) cardCls+=" age-warn";

  let h=`<div class="${cardCls}" id="dc${gi}">
    <div class="dt">
      <div class="nm n${ci}">${num}</div>
      <div class="di" onclick="document.getElementById('dc${gi}').classList.toggle('op')">
        <div class="dn">${esc(d.drug_name)}</div>
        <div class="dp${!wt&&!preview?" warn":""}">${contra&&contra.ageBlock?"⛔ CONTRAINDICATED for this age":preview||(wt?"See details":"Enter weight for doses")}</div>
      </div>
      <div class="da">
        <button class="ab${added?" on":""}" onclick="tSel(${gi})">${added?"✓":"+"}</button>
        <button class="eb" onclick="document.getElementById('dc${gi}').classList.toggle('op')"><svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></button>
      </div>
    </div>`;

  // Warning tags bar
  if(contra&&contra.tags.length){
    h+=`<div class="cw-bar">`;
    contra.tags.forEach(t=>{
      if(t.type==="age") h+=`<span class="cw-tag age">${t.text}</span>`;
      else if(["G6PD","NSAID allergy","Penicillin allergy","Cephalosporin allergy","Contains codeine","Potent steroid","QT prolongation","Resp. depression"].includes(t.text))
        h+=`<span class="cw-tag warn">⚠ ${t.text}</span>`;
      else h+=`<span class="cw-tag caution">${t.text}</span>`;
    });
    h+=`</div>`;
  }

  h+=`<div class="db"><div class="din">`;

  // Calculated dose — suppress if age-contraindicated
  if(calc&&wt&&!(contra&&contra.ageBlock)){
    h+=`<div class="ds"><div class="dl">Calculated Dose (${calc.dpk})</div><div class="dv" style="font-size:14px;font-weight:700;color:var(--p)">${calc.dose}  —  ${calc.fr}${calc.atMax?"\n⚠️ Max single dose reached":""}</div></div>`;
  }

  // Matrix dose table
  if(mx&&mx.entries.length>0){
    if(contra&&contra.ageBlock){
      h+=`<div class="mx-box" style="background:#FFF0F0;border-color:var(--r)"><div class="mx-title" style="color:var(--r)">⛔ CONTRAINDICATED — ${contra.tags.find(t=>t.type==='age')?.text||'Age restriction'}</div><div style="font-size:12px;color:#6B2020;padding:4px 0">Do NOT prescribe. Only doses for eligible ages shown below:</div>`;
      mx.entries.forEach((e,i)=>{
        if(!e.dose)return;
        h+=`<div class="mx-row"><span class="age">${e.age}</span><span class="wt">${e.wt}kg</span><span class="dose">${e.dose}</span></div>`;
      });
      h+=`</div>`;
    } else {
      h+=`<div class="mx-box"><div class="mx-title">Quick Dosing Matrix</div>`;
      mx.entries.forEach((e,i)=>{
        if(!e.dose)return;
        const hl=i===mx.matchIdx;
        h+=`<div class="mx-row${hl?" hl":""}"><span class="age">${e.age}</span><span class="wt">${e.wt}kg</span><span class="dose">${e.dose}</span></div>`;
      });
      h+=`</div>`;
    }
  }

  if(d.dosage_weight) h+=`<div class="ds"><div class="dl">Dosage by Weight</div><div class="dv">${esc(d.dosage_weight)}</div></div>`;
  if(d.dosage_age) h+=`<div class="ds"><div class="dl">Dosage by Age</div><div class="dv">${esc(d.dosage_age)}</div></div>`;
  if(d.contraindications) h+=`<div class="dhr"></div><div class="ds"><div class="dl">Contraindications & Remarks</div><div class="dw">${esc(d.contraindications)}</div></div>`;
  h+=`</div></div></div>`;
  return h;
}

// SELECTION
function tSel(gi){
  if(sel.has(gi))sel.delete(gi);else sel.set(gi,true);
  const c=document.getElementById("dc"+gi);
  if(c){const b=c.querySelector(".ab");b.classList.toggle("on",sel.has(gi));b.textContent=sel.has(gi)?"✓":"+"}
  updBdg();
}
function updBdg(){$("sN").textContent=sel.size;$("sBdg").classList.toggle("on",sel.size>0)}
function openSel(){
  const wt=getWt();
  let h="";
  if(wt) h+=`<div class="sp-pt"><div class="w">${wt} kg</div><div class="a">${estAge(wt)}</div></div>`;
  if(!sel.size){h+=`<div class="se">No drugs selected yet.<br>Tap <b>+</b> on any drug to add it.</div>`}
  else{
    sel.forEach((_,gi)=>{
      const d=DRUGS[gi];
      const calc=calcDose(d.drug_name,wt);
      const mx=getMatrixDose(d.drug_name,wt);
      const ageM=estAgeMonths(wt);
      const contra=getContra(gi,ageM);
      let doseStr="",freqStr="";
      if(wt){
        if(mx&&mx.matchDose){doseStr=mx.matchDose;freqStr="for "+mx.matchAge+" ("+wt+"kg)"}
        else if(calc){doseStr=calc.dose;freqStr=calc.dpk+" · "+calc.fr+(calc.atMax?" · ⚠️max":"")}
        else{doseStr="";freqStr="No auto-dose available"}
      } else {freqStr="Enter weight to calculate"}
      const isBlocked=contra&&contra.ageBlock;
      h+=`<div class="sd" style="${isBlocked?"background:#FFF0F0;border:1.5px solid #E8A0A0":""}"><button class="sd-x" onclick="rmSel(${gi})">✕</button>
        <div class="sd-c">${d.category}</div><div class="sd-n">${esc(d.drug_name)}</div>
        ${isBlocked?`<div class="sd-d" style="color:var(--r)">⛔ CONTRAINDICATED for this age</div>`
          :doseStr?`<div class="sd-d">${doseStr}</div>`:""}
        <div class="sd-f">${isBlocked?"":freqStr}</div>
        ${contra&&contra.tags.length?`<div style="display:flex;flex-wrap:wrap;gap:3px;margin-top:4px">${contra.tags.map(t=>
          t.type==="age"?`<span class="cw-tag age">${t.text}</span>`:
          ["G6PD","NSAID allergy","Penicillin allergy","Cephalosporin allergy","Contains codeine","Potent steroid","QT prolongation","Resp. depression"].includes(t.text)?`<span class="cw-tag warn">⚠ ${t.text}</span>`:
          `<span class="cw-tag caution">${t.text}</span>`).join("")}</div>`:""}</div>`;
    });
  }
  $("sB").innerHTML=h;$("sT").textContent=sel.size?"("+sel.size+")":"";
  $("sO").classList.add("on");$("sP").classList.add("on");
}
function closeSel(){$("sO").classList.remove("on");$("sP").classList.remove("on")}
function rmSel(gi){sel.delete(gi);openSel();updBdg();const c=document.getElementById("dc"+gi);if(c){const b=c.querySelector(".ab");if(b){b.classList.remove("on");b.textContent="+"}}}
function clrAll(){sel.clear();openSel();updBdg();document.querySelectorAll(".ab.on").forEach(b=>{b.classList.remove("on");b.textContent="+"})}

// SEARCH
function onSrch(){
  const q=$("sI").value.trim().toLowerCase();
  $("sX").classList.toggle("on",q.length>0);
  if(!q){$("sR").style.display="none";$("sG").style.display="";return}
  $("sG").style.display="none";$("sR").style.display="block";
  const wt=getWt(),ws=q.split(/\s+/);
  const res=DRUGS.filter(d=>{const s=(d.drug_name+" "+d.category+" "+d.dosage_weight+" "+d.contraindications).toLowerCase();return ws.every(w=>s.includes(w))});
  let h=`<div class="sl">${res.length} result${res.length!==1?"s":""}</div>`;
  if(!res.length)h+=`<div style="text-align:center;padding:28px;color:var(--t2);font-size:12px">No drugs found.</div>`;
  res.forEach((d,i)=>{const si=SYS.findIndex(s=>s.k===d.category);h+=mkCard(d,DRUGS.indexOf(d),i+1,si>=0?SYS[si].c:0,wt)});
  $("sR").innerHTML=h;
}
function clrS(){$("sI").value="";$("sX").classList.remove("on");$("sR").style.display="none";$("sG").style.display=""}

// FULL MATRICES
function renderMx(){
  const wt=getWt();
  let h="";
  for(const[name,rows] of Object.entries(RAW_MATRICES)){
    if(rows.length<3)continue;
    h+=`<div class="fm"><div class="fm-h" onclick="this.parentElement.classList.toggle('op')">${esc(name)}<svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="m6 9 6 6 6-6"/></svg></div><div class="fm-b"><div class="fm-s"><table class="mt"><thead><tr>`;
    const hdr=rows[0];const sn=new Set();
    hdr.forEach(c=>{c=c.replace(/\n/g," ").trim();if(!sn.has(c)){sn.add(c);h+=`<th>${esc(c)}</th>`}});
    h+=`</tr></thead><tbody>`;
    for(let r=1;r<rows.length;r++){
      const row=rows[r];
      if(/^Prep/i.test(row[0])||/dosing/i.test(row[0]))continue;
      const rwt=parseFloat(row[1]);
      const hl=wt&&rwt&&Math.abs(rwt-wt)<=2;
      h+=`<tr${hl?' class="hl"':""}>`;
      row.forEach((c,i)=>{if(i===0||c!==row[i-1])h+=`<td>${esc((c||"—").replace(/\n/g," "))}</td>`});
      h+=`</tr>`;
    }
    h+=`</tbody></table></div></div></div>`;
  }
  $("mL").innerHTML=h;
}
